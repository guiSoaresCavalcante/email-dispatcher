services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}

  email-dispatcher-api:
    build:
      context: ./email-dispatcher-api
      dockerfile: docker/Dockerfile
    ports:
      - "${API_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - CRM_PROVIDER=${CRM_PROVIDER}
      - CRM_PLOOMES_NAME=${CRM_PLOOMES_NAME}
      - CRM_PLOOMES_URL=${CRM_PLOOMES_URL}
      - CRM_PLOOMES_TOKEN=${CRM_PLOOMES_TOKEN}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  email-agent:
    build:
      context: ./email-agent
      dockerfile: Dockerfile
    ports:
      - "${AGENT_PORT}:8000"
    volumes:
      - ./email-agent/app:/app/app
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SEND_EMAIL_URL=${SEND_EMAIL_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      email-dispatcher-api:
        condition: service_healthy
    restart: unless-stopped

  email-dispatcher-web:
    build:
      context: ./email-dispatcher-web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-4200}:80"
    depends_on:
      email-dispatcher-api:
        condition: service_healthy
    restart: unless-stopped